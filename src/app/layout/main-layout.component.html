<mat-sidenav-container
  class="shell"
  [class.shell--dark]="shellDark()"
  [class.lc-shell--nav-collapsed-desktop]="!sidebarOpen() && !isHandset()"
>
  <mat-sidenav
    #drawer
    id="app-sidebar-nav"
    class="sidebar"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="sidebarOpen()"
    (openedChange)="onSidenavOpenedChange($event)"
  >
    <div class="sidebar-inner">
      <div class="sidebar-brand">
        <div class="sidebar-brand__mark" aria-hidden="true">
          <span class="sidebar-brand__cube"></span>
        </div>
        <div class="sidebar-brand__text">
          <span class="sidebar-brand__name">Logi</span><span class="sidebar-brand__name-rest">Care</span>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Main">
        <p class="nav-section-label">Main</p>
        <a
          class="nav-item"
          routerLink="/home"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
        >
          <mat-icon class="nav-item__icon" fontSet="material-icons-outlined">home</mat-icon>
          <span>Home</span>
        </a>

        <p class="nav-section-label">Administration</p>
        <div class="nav-group">
          <button type="button" class="nav-item nav-item--expandable" [class.is-open]="adminExpanded()" (click)="toggleAdmin()">
            <mat-icon class="nav-item__icon" fontSet="material-icons-outlined">admin_panel_settings</mat-icon>
            <span>Administration</span>
            <mat-icon class="nav-item__chevron">{{ adminExpanded() ? 'expand_less' : 'expand_more' }}</mat-icon>
          </button>
          @if (adminExpanded()) {
            <div class="nav-sub">
              <a class="nav-subitem" routerLink="/admin/client-setup" routerLinkActive="is-active" (click)="closeMobileMenu()">
                Client Setup
              </a>
              <a class="nav-subitem" routerLink="/admin/schedule" routerLinkActive="is-active" (click)="closeMobileMenu()">
                Schedule
              </a>
              <a class="nav-subitem" routerLink="/admin/users" routerLinkActive="is-active" (click)="closeMobileMenu()">
                Users
              </a>
            </div>
          }
        </div>

        <p class="nav-section-label">Workspace</p>
        <a class="nav-item" routerLink="/home" fragment="audit" (click)="closeMobileMenu()">
          <mat-icon class="nav-item__icon" fontSet="material-icons-outlined">assignment</mat-icon>
          <span>Audit Trail</span>
        </a>
        <a class="nav-item" routerLink="/home" fragment="reports" (click)="closeMobileMenu()">
          <mat-icon class="nav-item__icon" fontSet="material-icons-outlined">description</mat-icon>
          <span>Reports</span>
        </a>

        <p class="nav-section-label">Support</p>
        <a class="nav-item" routerLink="/home" fragment="help" (click)="closeMobileMenu()">
          <mat-icon class="nav-item__icon" fontSet="material-icons-outlined">help_outline</mat-icon>
          <span>Help</span>
        </a>
        <a class="nav-item" routerLink="/home" fragment="about" (click)="closeMobileMenu()">
          <mat-icon class="nav-item__icon" fontSet="material-icons-outlined">info</mat-icon>
          <span>About</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button type="button" class="sidebar-profile" [matMenuTriggerFor]="userMenu" aria-haspopup="menu" aria-label="Account menu">
          <div class="avatar" aria-hidden="true">{{ shortName.charAt(0) }}</div>
          <div class="sidebar-profile__meta">
            <span class="sidebar-profile__name">{{ userName }}</span>
            <span class="sidebar-profile__role">Super Admin</span>
          </div>
          <mat-icon class="sidebar-profile__more" aria-hidden="true">expand_more</mat-icon>
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main" [class.main--dark]="shellDark()">
    <header class="top-bar">
      <div class="top-bar__left">
        <button
          type="button"
          mat-icon-button
          class="top-bar__menu"
          (click)="toggleSidenav()"
          [attr.aria-expanded]="sidebarOpen()"
          aria-controls="app-sidebar-nav"
          aria-label="Toggle navigation"
        >
          <mat-icon>menu</mat-icon>
        </button>
      </div>

      <div class="top-bar__actions">
        <button
          type="button"
          mat-icon-button
          class="top-bar__action"
          aria-label="Notifications"
          matTooltip="Notifications"
          matTooltipPosition="below"
        >
          <mat-icon>notifications_none</mat-icon>
          <span class="top-bar__notify-dot" aria-hidden="true"></span>
        </button>
        <a
          mat-icon-button
          class="top-bar__action"
          routerLink="/home"
          fragment="help"
          aria-label="Help"
          matTooltip="Help"
          matTooltipPosition="below"
          (click)="closeMobileMenu()"
        >
          <mat-icon>help_outline</mat-icon>
        </a>
        <button
          type="button"
          mat-icon-button
          class="top-bar__action"
          [attr.aria-label]="shellDark() ? 'Light mode' : 'Dark mode'"
          matTooltip="{{ shellDark() ? 'Light mode' : 'Dark mode' }}"
          matTooltipPosition="below"
          (click)="toggleShellDark()"
        >
          <mat-icon>{{ shellDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <button type="button" mat-button [matMenuTriggerFor]="userMenu" class="top-bar__user-trigger">
          <span class="top-bar__user-name">{{ shortName }}</span>
          <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu" xPosition="before">
          <button mat-menu-item disabled>
            <mat-icon>person</mat-icon>
            Profile
          </button>
          <button mat-menu-item type="button" (click)="signOut()">
            <mat-icon>logout</mat-icon>
            Sign out
          </button>
        </mat-menu>
      </div>
    </header>

    <div class="main-scroll">
      <lc-page-loader [visible]="pageLoader.visible()" mode="contained" />
      <router-outlet />
      <footer class="app-footer">
        <span class="app-footer__text">Copyright © 2026 VaLogic LLC. All Rights Reserved.</span>
      </footer>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
