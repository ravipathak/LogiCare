<div class="client-setup-page">
  <div class="client-setup-page__container">
    <div class="page-shell-card">
      <div class="page-hero-panel">
        <header class="page-header">
          <h1 class="page-title">Client Setup</h1>
          <p class="page-subtitle">Configure locations, contacts, departments, and groups.</p>
        </header>

        <section class="setup-stats" aria-label="Client setup summary">
          <app-setup-stat-card
            variant="locations"
            label="Total Locations"
            icon="place"
            [value]="(locationCount$ | async) ?? 0"
            [active]="selectedTabIndex === 0"
            (cardClick)="onTabSelected(0)"
          />
          <app-setup-stat-card
            variant="contacts"
            label="Total Contacts"
            icon="contacts"
            [value]="(contactCount$ | async) ?? 0"
            [active]="selectedTabIndex === 1"
            (cardClick)="onTabSelected(1)"
          />
          <app-setup-stat-card
            variant="departments"
            label="Departments"
            icon="domain"
            [value]="(departmentCount$ | async) ?? 0"
            [active]="selectedTabIndex === 2"
            (cardClick)="onTabSelected(2)"
          />
          <app-setup-stat-card
            variant="groups"
            label="Groups"
            icon="groups"
            [value]="(groupCount$ | async) ?? 0"
            [active]="selectedTabIndex === 3"
            (cardClick)="onTabSelected(3)"
          />
        </section>
      </div>

      <div class="tabs-card">
        <mat-tab-group
          class="setup-tabs setup-tabs--pill"
          animationDuration="200ms"
          [mat-stretch-tabs]="true"
          [selectedIndex]="selectedTabIndex"
          (selectedIndexChange)="onTabSelected($event)"
        >
          <mat-tab label="Locations">
            <app-locations-tab />
          </mat-tab>

          <mat-tab label="Contacts">
            <app-contacts-tab />
          </mat-tab>

          <mat-tab label="Departments">
            <app-departments-tab />
          </mat-tab>

          <mat-tab label="Groups">
            <app-groups-tab />
          </mat-tab>
        </mat-tab-group>
      </div>
    </div>
  </div>
</div>
