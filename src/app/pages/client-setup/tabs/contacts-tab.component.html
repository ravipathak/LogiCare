<section class="contacts">
  <header class="contacts__header">
    <h2 class="contacts__title">Contacts List</h2>

    <div class="contacts__toolbar">
      <mat-form-field class="contacts__search" appearance="outline" subscriptSizing="dynamic">
        <mat-label>Search</mat-label>
        <input matInput placeholder="Search contacts..." />
        <button mat-icon-button matSuffix type="button" aria-label="Search">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>

      <button type="button" mat-flat-button color="primary" class="contacts__add" (click)="openCreateContact()">
        <mat-icon>add</mat-icon>
        Add Contact
      </button>
    </div>
  </header>

  <div class="contacts__grid-wrap">
    <ag-grid-angular
      class="ag-theme-alpine contacts__grid"
      [gridOptions]="gridOptions"
      [columnDefs]="columnDefs"
      [rowData]="rowData$ | async"
    />
  </div>
</section>
