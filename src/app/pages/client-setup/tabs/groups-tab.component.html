<section class="groups">
  <header class="groups__header">
    <h2 class="groups__title">Groups List</h2>

    <div class="groups__toolbar">
      <mat-form-field class="groups__search" appearance="outline" subscriptSizing="dynamic">
        <mat-label>Search</mat-label>
        <input matInput placeholder="Search groups..." />
        <button mat-icon-button matSuffix type="button" aria-label="Search">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>

      <button type="button" mat-flat-button color="primary" class="groups__add">
        <mat-icon>add</mat-icon>
        Add Group
      </button>
    </div>
  </header>

  <div class="groups__grid-wrap">
    <ag-grid-angular
      class="ag-theme-alpine groups__grid"
      [gridOptions]="gridOptions"
      [columnDefs]="columnDefs"
      [rowData]="rowData$ | async"
    />
  </div>
</section>
