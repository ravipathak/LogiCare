<section class="locations">
  <header class="locations__header">
    <h2 class="locations__title">Locations List</h2>

    <div class="locations__toolbar">
      <mat-form-field
        class="locations__search lc-toolbar-search"
        appearance="outline"
        subscriptSizing="dynamic"
      >
        <input matInput placeholder="Search locations…" aria-label="Search locations" />
        <span matSuffix class="lc-toolbar-search__suffix" aria-hidden="true">
          <span class="lc-toolbar-search__divider"></span>
          <mat-icon>search</mat-icon>
        </span>
      </mat-form-field>

      <button
        type="button"
        mat-flat-button
        color="primary"
        class="locations__add lc-btn-primary-elevate"
        (click)="openCreateLocation()"
      >
        <mat-icon>add</mat-icon>
        Add Location
      </button>
    </div>
  </header>

  <div class="locations__grid-wrap">
    <ag-grid-angular
      class="ag-theme-alpine locations__grid lc-setup-grid"
      [gridOptions]="gridOptions"
      [columnDefs]="columnDefs"
      [rowData]="rowData$ | async"
    />
  </div>
</section>
