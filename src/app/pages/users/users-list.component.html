<section class="page users-list">
  <div class="users-list__top">
    <h1 class="users-list__page-title">Users List</h1>
    <div class="users-list__top-actions">
      <button
        type="button"
        mat-flat-button
        class="users-list__btn-print"
        (click)="printPdf()"
      >
        <mat-icon>picture_as_pdf</mat-icon>
        Print PDF
      </button>
      <a
        mat-flat-button
        color="primary"
        class="users-list__btn-create"
        routerLink="/admin/users/create"
      >
        <mat-icon>add</mat-icon>
        Create User
      </a>
    </div>
  </div>

  <div class="users-list__controls">
    <div class="users-list__filter-block">
      <span class="users-list__filter-label" id="users-status-filter-label">Status</span>
      <mat-button-toggle-group
        class="users-list__status-toggle"
        [value]="statusFilter()"
        (change)="onStatusChange($event.value)"
        aria-labelledby="users-status-filter-label"
        hideSingleSelectionIndicator
      >
        <mat-button-toggle value="active">Active</mat-button-toggle>
        <mat-button-toggle value="inactive">Inactive</mat-button-toggle>
        <mat-button-toggle value="all">All</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <mat-form-field
      class="users-list__search"
      appearance="outline"
      subscriptSizing="dynamic"
    >
      <mat-label>Search Users</mat-label>
      <input
        matInput
        type="search"
        [value]="searchText()"
        (input)="onSearchInput($any($event.target).value)"
        autocomplete="off"
      />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="users-list__grid-wrap">
    <ag-grid-angular
      class="ag-theme-alpine users-list__grid"
      style="width: 100%; height: 100%; display: block"
      [gridOptions]="gridOptions"
      [columnDefs]="columnDefs"
      [rowData]="filteredRows()"
    />
  </div>
</section>
