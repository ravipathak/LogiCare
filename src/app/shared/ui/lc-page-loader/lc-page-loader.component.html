@if (visible()) {
  <div
    class="lc-page-loader__backdrop"
    [class.lc-page-loader__backdrop--fullscreen]="mode() === 'fullscreen'"
    role="status"
    aria-live="polite"
    [attr.aria-label]="message()"
  >
    <div class="lc-page-loader__panel">
      <div class="lc-page-loader__spinner-wrap" aria-hidden="true">
        <mat-progress-spinner mode="indeterminate" diameter="48" strokeWidth="4" />
      </div>
      <p class="lc-page-loader__message">{{ message() }}</p>
    </div>
  </div>
}
