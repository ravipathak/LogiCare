@if (visible()) {
  <div
    class="lc-page-loader__backdrop"
    [class.lc-page-loader__backdrop--fullscreen]="mode() === 'fullscreen'"
    role="status"
    aria-live="polite"
    [attr.aria-label]="ariaLabel()"
  >
    <div class="lc-page-loader__panel">
      <div class="lc-page-loader__brand" aria-hidden="true">
        <span class="lc-page-loader__logi">Logi</span><span class="lc-page-loader__care">Care</span>
      </div>
    </div>
  </div>
}
